{% extends "base.html" %}

{% block title %}Меню - Кафе "Три Бобра"{% endblock %}

{% block content %}
<h1 class="mb-4">🍽️ Наше меню</h1>

<div class="mb-4">
    <button class="btn btn-outline-danger active">Все</button>
    <button class="btn btn-outline-danger">Закуски</button>
    <button class="btn btn-outline-danger">Горячее</button>
    <button class="btn btn-outline-danger">Десерты</button>
    <button class="btn btn-outline-danger">Напитки</button>
</div>

<div class="row">
    {% for item in menu_items %}
    <div class="col-md-4 mb-4">
        <div class="card h-100">
            <div class="card-body">
                <h5 class="card-title">{{ item.name }}</h5>
                <p class="card-text text-muted">{{ item.description }}</p>
                <div class="d-flex justify-content-between align-items-center">
                    <span class="fs-4 fw-bold text-danger">{{ item.price }} ₽</span>
                    <button class="btn btn-danger add-to-cart" data-id="{{ item.id }}">
                        В корзину
                    </button>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/cart.js') }}"></script>
{% endblock %}
