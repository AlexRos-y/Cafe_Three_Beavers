{% extends "base.html" %}

{% block title %}Мои брони - Three Beavers Cafe{% endblock %}

{% block content %}
<div class="container">
    <h1 class="mb-4">Мои бронирования</h1>
    
    <div class="card shadow-sm">
        <div class="card-body text-center py-5">
            <span style="font-size: 80px;">🗓️</span>
            <h3 class="mt-3">У вас пока нет бронирований</h3>
            <p class="text-muted">Забронируйте столик в нашем уютном кафе</p>
            <a href="{{ url_for('booking.booking') }}" class="btn btn-primary">
                <i class="bi bi-calendar-check"></i> Забронировать столик
            </a>
        </div>
    </div>
</div>
{% endblock %}
