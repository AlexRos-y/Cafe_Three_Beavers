{% extends "base.html" %}

{% block title %}Корзина - Three Beavers Cafe{% endblock %}

{% block content %}
<div class="container">
    <h1 class="mb-4">Корзина</h1>
    
    <!-- Пока пустая корзина -->
    <div class="card shadow-sm">
        <div class="card-body text-center py-5">
            <span style="font-size: 80px;">🛒</span>
            <h3 class="mt-3">Ваша корзина пуста</h3>
            <p class="text-muted">Добавьте блюда из меню, чтобы оформить заказ</p>
            <a href="{{ url_for('menu.menu') }}" class="btn btn-primary">
                <i class="bi bi-menu-button-wide"></i> Перейти в меню
            </a>
        </div>
    </div>
    
    <!-- Здесь позже будет список товаров и кнопка оформления заказа -->
</div>
{% endblock %}
