{% extends "base.html" %}

{% block title %}Страница не найдена - Three Beavers Cafe{% endblock %}

{% block content %}
<div class="container text-center py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <span style="font-size: 120px;">❔</span>
            <h1 class="display-1 fw-bold text-dark-green">404</h1>
            <h2 class="mb-3">Страница не найдена</h2>
            <p class="lead text-muted mb-4">
                Бобры старались, но не смогли найти эту страницу.<br>
                Возможно, она была съедена или упала в реку.
            </p>
            <div class="d-flex justify-content-center gap-3">
                <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-lg">
                    <i class="bi bi-house"></i> На главную
                </a>
                <a href="{{ url_for('menu.menu') }}" class="btn btn-outline-primary btn-lg">
                    <i class="bi bi-menu-button-wide"></i> В меню
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
