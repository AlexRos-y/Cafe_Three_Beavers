{% extends "base.html" %}

{% block title %}Ошибка сервера - Three Beavers Cafe{% endblock %}

{% block content %}
<div class="container text-center py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <span style="font-size: 120px;">🔧</span>
            <h1 class="display-1 fw-bold text-danger">500</h1>
            <h2 class="mb-3">Что-то пошло не так</h2>
            <p class="lead text-muted mb-4">
                Бобры уже чинят плотину!<br>
                Попробуйте обновить страницу через пару минут.
            </p>
            <div class="d-flex justify-content-center gap-3">
                <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-lg">
                    <i class="bi bi-house"></i> На главную
                </a>
                <a href="javascript:location.reload()" class="btn btn-outline-primary btn-lg">
                    <i class="bi bi-arrow-clockwise"></i> Обновить
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
